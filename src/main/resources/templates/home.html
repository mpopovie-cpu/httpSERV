<!DOCTYPE html>
<html lang="en" ng-app="app">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>
<style>
body {
    margin:0; padding:0;
    font-family: sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}
.container { perspective: 1200px; }
.card {
    width: 360px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    text-align:center;
    transform-style: preserve-3d;
    transition: transform 0.2s ease;
    position: relative;
}
.glow {
    position:absolute;
    width:200px;
    height:200px;
    background: radial-gradient(circle, rgba(99,102,241,0.5), transparent 70%);
    top:-50px;
    right:-50px;
    filter: blur(40px);
}
a.button, button.button {
    display:block;
    width: 100%;
    margin:10px 0;
    padding:12px;
    border-radius:10px;
    background: linear-gradient(135deg,#38bdf8,#6366f1);
    color:white;
    text-decoration:none;
    font-weight:bold;
    transition: transform 0.2s, box-shadow 0.2s;
    border: none;
    cursor: pointer;
}
a.button:hover, button.button:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(0,0,0,0.4);}
</style>
</head>
<body ng-controller="indexController">
<div class="container">
    <div class="card" id="card">
        <div class="glow"></div>
        <h1>Java Server</h1>
        <button class="button" ng-click="go('/calculator?a=5&b=3')">Calculator</button>
        <button class="button" ng-click="go('/items')">View Items</button>
        <button class="button" ng-click="go('/create')">Create Item</button>
    </div>
</div>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
<script>
angular.module('app', []).controller('indexController', function ($scope, $http) {
    $scope.go = function (path) {
        window.location.href = path;
    };
});
</script>
<script>
const card=document.getElementById('card');
document.addEventListener('mousemove', e => {
    const x=(window.innerWidth/2-e.pageX)/25;
    const y=(window.innerHeight/2-e.pageY)/25;
    card.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`;
});
document.addEventListener('mouseleave', ()=> card.style.transform='rotateY(0deg) rotateX(0deg)');
</script>
</body>
</html>
